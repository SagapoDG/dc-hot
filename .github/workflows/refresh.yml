name: refresh-news

on:
  schedule:
    - cron: "*/30 * * * *"   # 每 30 分钟自动抓取（GitHub 调度高峰期可能延迟）
  workflow_dispatch: {}       # 支持手动触发

permissions:
  contents: write

concurrency:
  group: refresh-news
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 抓取资讯
        run: python fetch_news.py
      - name: 提交数据（有变化时）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json archive.json
          git diff --cached --quiet || { git commit -m "auto: refresh news data"; git push; }
